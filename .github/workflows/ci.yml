name: Project verification

on:
  pull_request:
  push:
    branches:
      - main
      - foundation

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-only-secret-ci-only-secret-ci-only-secret
      AUTH_GOOGLE_ID: ci-client-id.apps.googleusercontent.com
      AUTH_GOOGLE_SECRET: ci-client-secret
      AUTH_TRUST_HOST: true
      DATA_PROVIDER: sheets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install browser audit tools
        run: npm install --no-save @playwright/test@1.61.0 @lhci/cli@0.15.1
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run lint
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
      - name: Fail on typecheck errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - run: npm test
      - run: npm run build
      - name: Mobile acceptance
        run: npx playwright test
      - name: Lighthouse quality gates
        run: npx lhci autorun --config=./lighthouserc.json
      - name: Upload PWA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-verification
          path: |
            .lighthouseci
            test-results
          if-no-files-found: ignore
