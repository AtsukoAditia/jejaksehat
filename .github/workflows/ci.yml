name: Project verification

on:
  pull_request:
  push:
    branches:
      - main
      - foundation

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-only-secret-ci-only-secret-ci-only-secret
      AUTH_GOOGLE_ID: ci-client-id.apps.googleusercontent.com
      AUTH_GOOGLE_SECRET: ci-client-secret
      AUTH_TRUST_HOST: true
      DATA_PROVIDER: sheets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
